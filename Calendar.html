<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Takvim Widget</title>
    <style>
        :root {
            --bg-color: #f4f4f5;
            --widget-bg: #ffffff;
            --text-main: #18181b;
            --text-muted: #71717a;
            --accent: #4f46e5;
            --border: #e4e4e7;
        }

        /* Widget genel ayarları */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        
        body { background-color: var(--bg-color); height: 100vh; overflow: hidden; }

        .widget-container {
            width: 100%;
            height: 100%;
            background-color: var(--widget-bg);
            padding: 10px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .nav-controls { display: flex; justify-content: space-between; margin-bottom: 8px; }
        .nav-controls button {
            background: var(--accent); color: white; border: none;
            padding: 4px 8px; border-radius: 4px; cursor: pointer; font-size: 0.7rem;
        }

        .months-list {
            flex-grow: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .month-section { border-bottom: 1px solid var(--border); padding-bottom: 8px; }
        .month-title { font-size: 0.8rem; font-weight: bold; margin-bottom: 4px; color: var(--text-main); }

        .calendar-grid {
            display: grid;
            grid-template-columns: 15px repeat(7, 1fr);
            gap: 2px;
            font-size: 0.7rem;
        }

        .grid-header { color: var(--text-muted); text-align: center; font-size: 0.6rem; }
        .week-num { color: var(--accent); font-weight: bold; text-align: center; }
        .day-cell { text-align: center; padding: 2px 0; color: var(--text-main); }
        .day-cell.today { background-color: var(--accent); color: white; border-radius: 3px; font-weight: bold; }
        .empty { opacity: 0; }
    </style>
</head>
<body>

    <div class="widget-container">
        <div class="nav-controls">
            <button id="prevBtn">← Önceki</button>
            <button id="nextBtn">Sonraki →</button>
        </div>
        <div class="months-list" id="monthsContainer"></div>
    </div>

    <script>
        const monthsContainer = document.getElementById('monthsContainer');
        let currentBaseDate = new Date();
        const monthNames = ["Ocak", "Şubat", "Mart", "Nisan", "Mayıs", "Haziran", "Temmuz", "Ağustos", "Eylül", "Ekim", "Kasım", "Aralık"];
        const dayNames = ["Pz", "Sa", "Ça", "Pe", "Cu", "Ct", "Pa"];

        function getWeekNumber(d) {
            let date = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
            date.setUTCDate(date.getUTCDate() + 4 - (date.getUTCDay() || 7));
            const yearStart = new Date(Date.UTC(date.getUTCFullYear(), 0, 1));
            return Math.ceil((((date - yearStart) / 86400000) + 1) / 7);
        }

        function renderCalendar() {
            monthsContainer.innerHTML = '';
            for (let i = 0; i < 3; i++) {
                const targetDate = new Date(currentBaseDate.getFullYear(), currentBaseDate.getMonth() + i, 1);
                const year = targetDate.getFullYear();
                const month = targetDate.getMonth();
                
                const monthSection = document.createElement('div');
                monthSection.className = 'month-section';
                monthSection.innerHTML = `<div class="month-title">${monthNames[month]} ${year}</div>`;
                
                const grid = document.createElement('div');
                grid.className = 'calendar-grid';
                grid.innerHTML = '<div class="grid-header">#</div>' + dayNames.map(d => `<div class="grid-header">${d}</div>`).join('');

                let firstDay = (new Date(year, month, 1).getDay() + 6) % 7;
                let totalDays = new Date(year, month + 1, 0).getDate();
                let day = 1;

                for (let w = 0; w < 6; w++) {
                    if (day > totalDays) break;
                    grid.innerHTML += `<div class="week-num">${getWeekNumber(new Date(year, month, day))}</div>`;
                    for (let d = 0; d < 7; d++) {
                        if ((w === 0 && d < firstDay) || day > totalDays) {
                            grid.innerHTML += '<div class="day-cell empty"></div>';
                        } else {
                            const isToday = (new Date().toDateString() === new Date(year, month, day).toDateString());
                            grid.innerHTML += `<div class="day-cell ${isToday ? 'today' : ''}">${day++}</div>`;
                        }
                    }
                }
                monthSection.appendChild(grid);
                monthsContainer.appendChild(monthSection);
            }
        }

        document.getElementById('prevBtn').addEventListener('click', () => { currentBaseDate.setMonth(currentBaseDate.getMonth() - 3); renderCalendar(); });
        document.getElementById('nextBtn').addEventListener('click', () => { currentBaseDate.setMonth(currentBaseDate.getMonth() + 3); renderCalendar(); });
        renderCalendar();
    </script>
</body>
</html>

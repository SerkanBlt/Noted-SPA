<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Takvim</title>
    <style>
        :root {
            --bg-color: #f4f4f5;
            --widget-bg: #ffffff;
            --text-main: #18181b;
            --text-muted: #71717a;
            --accent: #4f46e5;
            --border: #e4e4e7;
            --today-bg: #f4f4f5;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #121214;
                --widget-bg: #1a1a1e;
                --text-main: #ffffff;
                --text-muted: #a0a0aa;
                --accent: #6366f1;
                --border: #27272a;
                --today-bg: #27272a;
            }
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; }

        body {
            background-color: var(--bg-color);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }

        /* Tam ekran ve dinamik genişlik ayarları */
        .widget-container {
            width: 100%;
            height: 100vh;
            background-color: var(--widget-bg);
            padding: 20px;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }

        .nav-controls {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
        }

        .nav-controls button {
            background: var(--accent);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
        }

        .months-list {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
        }

        .month-section {
            border: 1px solid var(--border);
            padding: 15px;
            border-radius: 8px;
        }

        .month-title { font-weight: bold; margin-bottom: 10px; color: var(--text-main); }

        .calendar-grid {
            display: grid;
            grid-template-columns: 20px repeat(7, 1fr);
            gap: 4px;
            font-size: 0.9rem;
        }

        .grid-header { color: var(--text-muted); font-size: 0.8rem; text-align: center; }
        .week-num { color: var(--accent); font-weight: bold; font-size: 0.8rem; }
        .day-cell { text-align: center; padding: 5px; color: var(--text-main); }
        .day-cell.today { background-color: var(--accent); color: white; border-radius: 4px; }
        .empty { opacity: 0; }
    </style>
</head>
<body>

    <div class="widget-container">
        <div class="nav-controls">
            <button id="prevBtn">← Önceki 3 Ay</button>
            <button id="nextBtn">Sonraki 3 Ay →</button>
        </div>
        <div class="months-list" id="monthsContainer"></div>
    </div>

    <script>
        const monthsContainer = document.getElementById('monthsContainer');
        let currentBaseDate = new Date();
        const monthNames = ["Ocak", "Şubat", "Mart", "Nisan", "Mayıs", "Haziran", "Temmuz", "Ağustos", "Eylül", "Ekim", "Kasım", "Aralık"];
        const dayNames = ["Pz", "Sa", "Ça", "Pe", "Cu", "Ct", "Pa"];

        function getWeekNumber(d) {
            d = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
            d.setUTCDate(d.getUTCDate() + 4 - (d.getUTCDay() || 7));
            const yearStart = new Date(Date.UTC(d.getUTCFullYear(), 0, 1));
            return Math.ceil((((d - yearStart) / 86400000) + 1) / 7);
        }

        function renderCalendar() {
            monthsContainer.innerHTML = '';
            for (let i = 0; i < 3; i++) {
                const targetDate = new Date(currentBaseDate.getFullYear(), currentBaseDate.getMonth() + i, 1);
                const year = targetDate.getFullYear();
                const month = targetDate.getMonth();
                
                const monthSection = document.createElement('div');
                monthSection.className = 'month-section';
                monthSection.innerHTML = `<div class="month-title">${monthNames[month]} ${year}</div>`;
                
                const grid = document.createElement('div');
                grid.className = 'calendar-grid';
                grid.innerHTML = '<div class="grid-header">H</div>' + dayNames.map(d => `<div class="grid-header">${d}</div>`).join('');

                let firstDay = (new Date(year, month, 1).getDay() + 6) % 7;
                let totalDays = new Date(year, month + 1, 0).getDate();
                let day = 1;

                for (let w = 0; w < 6; w++) {
                    if (day > totalDays) break;
                    grid.innerHTML += `<div class="week-num">${getWeekNumber(new Date(year, month, day))}</div>`;
                    for (let d = 0; d < 7; d++) {
                        if ((w === 0 && d < firstDay) || day > totalDays) {
                            grid.innerHTML += '<div class="day-cell empty"></div>';
                        } else {
                            const isToday = (new Date().toDateString() === new Date(year, month, day).toDateString());
                            grid.innerHTML += `<div class="day-cell ${isToday ? 'today' : ''}">${day++}</div>`;
                        }
                    }
                }
                monthSection.appendChild(grid);
                monthsContainer.appendChild(monthSection);
            }
        }

        document.getElementById('prevBtn').addEventListener('click', () => { currentBaseDate.setMonth(currentBaseDate.getMonth() - 3); renderCalendar(); });
        document.getElementById('nextBtn').addEventListener('click', () => { currentBaseDate.setMonth(currentBaseDate.getMonth() + 3); renderCalendar(); });
        renderCalendar();
    </script>
</body>
</html>
